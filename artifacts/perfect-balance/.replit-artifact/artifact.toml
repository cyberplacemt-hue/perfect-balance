kind = "web"
previewPath = "/"
title = "Perfect Balance — Horseshoe Store"
version = "1.0.0"
id = "artifacts/perfect-balance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23245

[services.development]
run = "pnpm --filter @workspace/perfect-balance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/perfect-balance", "run", "build" ]
publicDir = "artifacts/perfect-balance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23245"
BASE_PATH = "/"
